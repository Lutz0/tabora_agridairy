{% extends "layout.html" %}
{% block title %}{{ 'Edit Payment' if payment else 'Add Payment' }} - Tabora AgriDairy{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>{{ 'Edit Payment' if payment else 'Add Payment' }}</h2>
    <a href="{{ url_for('payment.list_payments') }}" class="btn btn-outline-secondary">Back to List</a>
</div>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="farmer_id" class="form-label">Farmer *</label>
                    <select class="form-select" id="farmer_id" name="farmer_id" required>
                        <option value="">Select farmer</option>
                        {% for f in farmers %}
                        <option value="{{ f.id }}" {{ 'selected' if payment and payment.farmer_id == f.id else '' }}>{{ f.username }} ({{ f.email }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="amount" class="form-label">Amount *</label>
                    <input type="number" class="form-control" id="amount" name="amount" step="0.01" min="0" required
                           value="{{ payment.amount if payment else '' }}">
                </div>
                <div class="col-md-6">
                    <label for="payment_date" class="form-label">Payment Date *</label>
                    <input type="date" class="form-control" id="payment_date" name="date" required
                           value="{{ payment.payment_date.strftime('%Y-%m-%d') if payment else '' }}">
                </div>
                <div class="col-md-6">
                    <label for="payment_method" class="form-label">Payment Method *</label>
                    <select class="form-select" id="payment_method" name="payment_method" required>
                        {% set method = payment.payment_method if payment and payment.payment_method else 'Cash' %}
                        <option value="Mpesa" {{ 'selected' if method == 'Mpesa' else '' }}>Mpesa</option>
                        <option value="Cash" {{ 'selected' if method == 'Cash' else '' }}>Cash</option>
                        <option value="Card" {{ 'selected' if method == 'Card' else '' }}>Card</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="reference" class="form-label">Reference (required for Mpesa)</label>
                    <input type="text" class="form-control" id="reference" name="reference"
                           value="{{ payment.reference if payment and payment.reference else '' }}"
                           placeholder="Mpesa code or receipt number">
                </div>
                <div class="col-12">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="2">{{ payment.description if payment else '' }}</textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">{{ 'Update' if payment else 'Save' }} Payment</button>
                <a href="{{ url_for('payment.list_payments') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
