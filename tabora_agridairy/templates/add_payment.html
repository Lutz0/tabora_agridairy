{% extends "layout.html" %}
{% block title %}Add Payment - Tabora AgriDairy{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Add Payment</h2>
    <a href="{{ url_for('payment.list_payments') }}" class="btn btn-outline-secondary">Back to List</a>
</div>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post" action="{{ url_for('payment.add_payment') }}">
            <div class="row g-3">
                {% if current_user.is_admin() %}
                <div class="col-md-6">
                    <label for="farmer_id" class="form-label">Farmer *</label>
                    <select class="form-select" id="farmer_id" name="farmer_id" required>
                        <option value="">Select farmer</option>
                        {% for f in farmers %}
                        <option value="{{ f.id }}">{{ f.username }} ({{ f.email }})</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}
                <div class="col-md-6">
                    <label for="amount" class="form-label">Amount *</label>
                    <input type="number" class="form-control" id="amount" name="amount" step="0.01" min="0" required>
                </div>
                <div class="col-md-6">
                    <label for="date" class="form-label">Date *</label>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>
                <div class="col-md-6">
                    <label for="payment_method" class="form-label">Payment Method *</label>
                    <select class="form-select" id="payment_method" name="payment_method" required>
                        <option value="Mpesa">Mpesa</option>
                        <option value="Cash" selected>Cash</option>
                        <option value="Card">Card</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="reference" class="form-label">Reference</label>
                    <input type="text" class="form-control" id="reference" name="reference" placeholder="Mpesa code or receipt">
                </div>
                <div class="col-12">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="2"></textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-success">Save Payment</button>
                <a href="{{ url_for('payment.list_payments') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
