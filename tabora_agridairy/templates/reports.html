{% extends "layout.html" %}
{% block title %}Reports - Tabora AgriDairy{% endblock %}
{% block content %}
<h2 class="mb-4">Reports & Analytics</h2>
<div class="row g-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">Daily Milk Production (Last 14 Days)</h5>
            </div>
            <div class="card-body">
                <canvas id="dailyMilkChart" height="80"></canvas>
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">Monthly Milk Production</h5>
            </div>
            <div class="card-body">
                <canvas id="monthlyMilkChart" height="80"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">Inventory by Category</h5>
            </div>
            <div class="card-body">
                <canvas id="inventoryChart" height="200"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">Payments by Month</h5>
            </div>
            <div class="card-body">
                <canvas id="paymentsChart" height="200"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
(function() {
    const dailyCtx = document.getElementById('dailyMilkChart');
    if (dailyCtx) {
        new Chart(dailyCtx, {
            type: 'bar',
            data: {
                labels: {{ daily_labels | tojson }},
                datasets: [{
                    label: 'Milk (L)',
                    data: {{ daily_values | tojson }},
                    backgroundColor: 'rgba(13, 110, 253, 0.6)',
                    borderColor: 'rgba(13, 110, 253, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }
    const monthlyCtx = document.getElementById('monthlyMilkChart');
    if (monthlyCtx) {
        new Chart(monthlyCtx, {
            type: 'line',
            data: {
                labels: {{ monthly_labels | tojson }},
                datasets: [{
                    label: 'Milk (L)',
                    data: {{ monthly_values | tojson }},
                    borderColor: 'rgba(25, 135, 84, 1)',
                    backgroundColor: 'rgba(25, 135, 84, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }
    const invCtx = document.getElementById('inventoryChart');
    if (invCtx) {
        new Chart(invCtx, {
            type: 'doughnut',
            data: {
                labels: {{ inv_labels | tojson }},
                datasets: [{
                    data: {{ inv_values | tojson }},
                    backgroundColor: ['rgba(13, 110, 253, 0.8)', 'rgba(25, 135, 84, 0.8)', 'rgba(255, 193, 7, 0.8)'],
                    borderWidth: 1
                }]
            },
            options: { responsive: true }
        });
    }
    const payCtx = document.getElementById('paymentsChart');
    if (payCtx) {
        new Chart(payCtx, {
            type: 'bar',
            data: {
                labels: {{ pay_labels | tojson }},
                datasets: [{
                    label: 'Payments',
                    data: {{ pay_values | tojson }},
                    backgroundColor: 'rgba(255, 193, 7, 0.6)',
                    borderColor: 'rgba(255, 193, 7, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }
})();
</script>
{% endblock %}
