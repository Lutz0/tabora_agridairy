{% extends "layout.html" %}
{% block title %}{{ 'Edit Item' if item else 'Add Item' }} - Tabora AgriDairy{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>{{ 'Edit Item' if item else 'Add Inventory Item' }}</h2>
    <a href="{{ url_for('inventory.list_items') }}" class="btn btn-outline-secondary">Back to List</a>
</div>
<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="item_name" class="form-label">Item Name *</label>
                    <input type="text" class="form-control" id="item_name" name="item_name" required
                           value="{{ item.item_name if item else '' }}">
                </div>
                <div class="col-md-6">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-select" id="category" name="category">
                        <option value="Feed" {{ 'selected' if item and item.category == 'Feed' else '' }}>Feed</option>
                        <option value="Medicine" {{ 'selected' if item and item.category == 'Medicine' else '' }}>Medicine</option>
                        <option value="Equipment" {{ 'selected' if item and item.category == 'Equipment' else '' }}>Equipment</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="quantity" class="form-label">Quantity</label>
                    <input type="number" class="form-control" id="quantity" name="quantity" min="0"
                           value="{{ item.quantity if item else 0 }}">
                </div>
                <div class="col-md-6">
                    <label for="unit" class="form-label">Unit</label>
                    <input type="text" class="form-control" id="unit" name="unit" placeholder="e.g. kg, liters, pieces"
                           value="{{ item.unit if item else 'units' }}">
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">{{ 'Update' if item else 'Add' }} Item</button>
                <a href="{{ url_for('inventory.list_items') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
