{% extends "layout.html" %}
{% block title %}Settings - Tabora AgriDairy{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Settings</h2>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="farm_name" class="form-label">Farm Name *</label>
                    <input type="text" class="form-control" id="farm_name" name="farm_name" required value="{{ farm_name }}">
                </div>
                <div class="col-md-6">
                    <label for="admin_email" class="form-label">Admin Email *</label>
                    <input type="email" class="form-control" id="admin_email" name="admin_email" required value="{{ admin_email }}">
                </div>
                <div class="col-12">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="notifications_enabled" name="notifications_enabled" {{ 'checked' if notifications_enabled else '' }}>
                        <label class="form-check-label" for="notifications_enabled">Enable Notifications</label>
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-success">Save Settings</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
