{% extends "layout.html" %}
{% block title %}Add Cow - Tabora AgriDairy{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Add Cow</h2>
    <a href="{{ url_for('cow.list_cows') }}" class="btn btn-outline-secondary">Back to Cows</a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post" action="{{ url_for('cow.add_cow') }}" id="addCowForm">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="tag_number" class="form-label">Tag Number *</label>
                    <input type="text" class="form-control" id="tag_number" name="tag_number" required maxlength="50">
                </div>
                <div class="col-md-6">
                    <label for="breed" class="form-label">Breed *</label>
                    <input type="text" class="form-control" id="breed" name="breed" required maxlength="100">
                </div>
                <div class="col-md-6">
                    <label for="age" class="form-label">Age *</label>
                    <input type="number" class="form-control" id="age" name="age" min="0" required>
                </div>
                <div class="col-md-6">
                    <label for="status" class="form-label">Status *</label>
                    <select class="form-select" id="status" name="status" required>
                        <option value="Healthy">Healthy</option>
                        <option value="Sick">Sick</option>
                        <option value="Sold">Sold</option>
                        <option value="Under Treatment">Under Treatment</option>
                    </select>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-success" id="submitBtn">Add Cow</button>
                <a href="{{ url_for('cow.list_cows') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('addCowForm')?.addEventListener('submit', function () {
    const btn = document.getElementById('submitBtn');
    if (btn) {
        btn.disabled = true;
        btn.textContent = 'Saving...';
    }
});
</script>
{% endblock %}
